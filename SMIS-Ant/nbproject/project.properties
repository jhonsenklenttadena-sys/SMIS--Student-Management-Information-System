annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.processor.options=
annotation.processing.processors.list=
annotation.processing.run.all.processors=true
annotation.processing.source.output=${build.generated.sources.dir}/ap-source-output

build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
build.sysclasspath=ignore
clean.on.nonexistent.sources=true

compile.on.save=true
debug.classpath=${run.classpath}
debug.modulepath=${run.modulepath}
debug.test.classpath=${run.test.classpath}
debug.test.modulepath=${run.test.modulepath}

# JavaFX requires the module path and --add-modules JVM options.
# These JARs are all in the lib/ folder.
dist.dir=dist
dist.jar=${dist.dir}/SMIS.jar
dist.jlink.dir=${dist.dir}/jlink
dist.jlink.output=${dist.jlink.dir}/SMIS
excludes=
includes=**

jar.compress=false
javac.classpath=\
    ${file.reference.javafx-base-21.0.2-win.jar}:\
    ${file.reference.javafx-controls-21.0.2-win.jar}:\
    ${file.reference.javafx-fxml-21.0.2-win.jar}:\
    ${file.reference.javafx-graphics-21.0.2-win.jar}:\
    ${file.reference.sqlite-jdbc-3.45.1.0.jar}:\
    ${file.reference.bcrypt-0.10.2.jar}:\
    ${file.reference.bytes-1.5.0.jar}
javac.compilerargs=--add-modules javafx.controls,javafx.fxml
javac.deprecation=false
javac.external.vm=true
javac.processorpath=\
    ${javac.classpath}
javac.source=21
javac.target=21
javac.test.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
javac.test.processorpath=\
    ${javac.test.classpath}
jlink.additionalmodules=
jlink.additionalpaths=
jlink.launcher=true
jlink.launcher.name=SMIS

main.class=com.smis.Main

manifest.file=manifest.mf

meta.inf.dir=${src.dir}/META-INF

mkdist.disabled=false
platform.active=default_platform

# Run classpath includes both lib JARs and the built classes
run.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}

# JVM arguments: load JavaFX modules from the lib folder
run.jvmargs=--module-path lib --add-modules javafx.controls,javafx.fxml

run.modulepath=
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}
run.test.modulepath=

# Source directory
src.dir=src
test.src.dir=test

# File references for library JARs
file.reference.javafx-base-21.0.2-win.jar=lib/javafx-base-21.0.2-win.jar
file.reference.javafx-controls-21.0.2-win.jar=lib/javafx-controls-21.0.2-win.jar
file.reference.javafx-fxml-21.0.2-win.jar=lib/javafx-fxml-21.0.2-win.jar
file.reference.javafx-graphics-21.0.2-win.jar=lib/javafx-graphics-21.0.2-win.jar
file.reference.sqlite-jdbc-3.45.1.0.jar=lib/sqlite-jdbc-3.45.1.0.jar
file.reference.bcrypt-0.10.2.jar=lib/bcrypt-0.10.2.jar
file.reference.bytes-1.5.0.jar=lib/bytes-1.5.0.jar
